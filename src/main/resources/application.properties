# ============================================================
# application.properties
# Todas as variaveis sensiveis vem do arquivo .env
# ============================================================

spring.application.name=News AI Daily

# Email ? lido do .env
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# NewsAPI ? lido do .env
newsapi.key=${NEWSAPI_KEY}
newsapi.url=https://newsapi.org/v2/top-headlines
newsapi.pageSize=${NEWSAPI_PAGE_SIZE:10}

# Anthropic (Claude AI) ? lido do .env
anthropic.api.key=${ANTHROPIC_API_KEY}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.model=claude-sonnet-4-20250514

# Email destinatario ? lido do .env
email.destinatario=${EMAIL_DESTINATARIO}
email.remetente.nome=${EMAIL_REMETENTE_NOME:News AI Daily}

# Agendamento ? lido do .env
news.scheduler.cron=${NEWS_SCHEDULER_CRON:0 0 8 * * ?}

# Log
logging.level.com.newsai=INFO